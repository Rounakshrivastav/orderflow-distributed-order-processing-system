
## datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/orderflow?options=-c%20TimeZone=UTC
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

## redis config
spring.data.redis.host=localhost
spring.data.redis.port=6379

##kafka config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest

## producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

## consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.orderflow.kafka.event.OrderEvent

##kafka retry
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=1
spring.kafka.listener.retry.backoff.ms=1000
spring.kafka.listener.retry.max-attempts=3